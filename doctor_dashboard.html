<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard - AlzDetect</title>
<link rel="stylesheet" href="static/css/style.css">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>
:root {
    --dark: #004d40;
    --light: #00897b;
    --bg: #f5f8f8;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.06);
    --border-color: #e0e6e5;
}

body { margin:0; background:var(--bg); font-family:'Inter', Arial, sans-serif; color: #333; }

.sidebar {
    width:240px;
    height:100vh;
    background:var(--dark);
    position:fixed;
    left:0; top:0;
    padding-top:25px;
    color:white;
    transition:0.3s;
    z-index: 999;
}
.sidebar.hidden { left:-260px; }
.sidebar h2 { text-align:center; margin-bottom:30px; }
.sidebar a {
    display:block;
    padding:14px 25px;
    color:white;
    text-decoration:none;
}
.sidebar a:hover { background:var(--light); }

.toggle-btn {
    position:fixed;
    left:20px; top:20px;
    background:var(--dark);
    color:white;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    z-index:1000;
}

.main {
    margin-left:260px;
    padding:40px;
    transition:0.3s;
}
.main.full { margin-left:0; }

.dashboard-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    margin-top: 25px;
}

.welcome-box {
    background:linear-gradient(135deg,var(--dark),var(--light));
    padding:35px 30px;
    color:white;
    border-radius:16px;
    box-shadow: 0 10px 30px rgba(0,77,64,0.15);
}
.welcome-box h1 {
    margin-top: 0;
    font-size: 28px;
    font-weight: 700;
}
.welcome-box p {
    margin-bottom: 0;
    opacity: 0.9;
    font-size: 16px;
}

.card {
    background:white;
    padding:30px;
    border-radius:16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--card-shadow);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.card:hover {
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}
.card h2 { margin-top: 0; color: var(--dark); font-weight: 600; }
.card h3 { color: #666; font-size: 15px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

.patient-item {
    padding:16px 20px;
    background:#fff;
    border: 1px solid var(--border-color);
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s ease;
}
.patient-item:hover { 
    background:#f4faf9; 
    border-color: var(--light);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,137,123,0.1);
}
.patient-item-info strong {
    font-size: 16px;
    color: #222;
}
.patient-item-info span {
    font-size: 14px;
    color: #777;
    margin-top: 4px;
    display: block;
}
.patient-item::after {
    content: "➔";
    color: var(--light);
    font-size: 18px;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.2s ease;
}
.patient-item:hover::after {
    opacity: 1;
    transform: translateX(0);
}

input, select, textarea {
    width:100%;
    padding:14px;
    border-radius:8px;
    border:1px solid #d1d5db;
    margin-bottom:15px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
}
input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--light);
    box-shadow: 0 0 0 3px rgba(0,137,123,0.15);
}

.btn-primary {
    background:var(--light);
    padding:12px 24px;
    border:none;
    color:white;
    font-weight: 600;
    font-size: 15px;
    border-radius:8px;
    cursor:pointer;
    transition: all 0.2s;
}
.btn-primary:hover { 
    background:#00796b; 
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,121,107,0.3);
}

/* Floating AI Button */
#ai-float-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 65px;
    height: 65px;
    background: linear-gradient(135deg,#004d40,#00897b);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,77,64,0.4);
    transition: 0.3s;
    z-index: 999;
}

#ai-float-btn:hover {
    transform: scale(1.1);
}

/* Chat Panel */
#ai-chat-panel {
    position: fixed;
    bottom: 100px;
    right: 25px;
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
}

/* Header */
#ai-chat-header {
    background: linear-gradient(135deg,#004d40,#00897b);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    font-weight: bold;
}

/* Messages */
#ai-chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    font-size: 14px;
    background: #f5f5f5;
}

/* Input Area */
#ai-chat-input-area {
    display: flex;
    border-top: 1px solid #ddd;
}

#ai-chat-input-area input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
}

#ai-chat-input-area button {
    width: 50px;
    background: #004d40;
    color: white;
    border: none;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h2>Doctor Panel</h2>
    <a href="#" onclick="showDashboard()">🏠 Dashboard</a>
    <a href="patients_list.html" onclick="showPatients()">🧑‍⚕ Manage Patients</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="toggle-btn" onclick="toggleSidebar()">☰</div>

<div class="main" id="main">

    <!-- DASHBOARD HOME -->
    <div id="dashboard-section">
        <div class="welcome-box">
            <h1 id="doctor-name">Welcome Doctor</h1>
            <p>Overview of system activity and patient records.</p>
        </div>

        <div class="dashboard-stats-grid">
            <div class="card">
                <h3>Total Patients</h3>
                <h2 id="total-patients" style="font-size: 32px; margin-bottom: 0;">0</h2>
            </div>

            <div class="card">
                <h3>Total MRI Reports</h3>
                <h2 id="total-mri" style="font-size: 32px; margin-bottom: 0;">0</h2>
            </div>
        </div>
    </div>

    <!-- MANAGE PATIENTS -->
    <div id="patients-section" style="display:none;">

        <div class="card">
            <h2>All Patients</h2>
            <div id="patients-list"></div>
        </div>

        <div class="card">
            <h2>Patient Details</h2>
            <div id="patient-details">
                Select a patient to view details.
            </div>
        </div>

    </div>

</div>

<!-- ================= AI FLOATING BUTTON ================= -->

<div id="ai-float-btn" onclick="toggleChat()">
    AI
</div>

<div id="ai-chat-panel">

    <div id="ai-chat-header">
        <span>AI Assistant</span>
        <span onclick="toggleChat()" style="cursor:pointer;">✕</span>
    </div>

    <div id="ai-chat-messages"></div>

    <div id="ai-chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Ask about MRI, MoCA..." />
        <button onclick="sendAIMessage()">➤</button>
    </div>

</div>


<script>


/* ================= AI CHAT ================= */

function toggleChat(){
    const panel = document.getElementById("ai-chat-panel");

    if(panel.style.display === "flex"){
        panel.style.display = "none";
    }else{
        panel.style.display = "flex";
    }
}

function appendMessage(sender, text, isUser=false) {
    const box = document.getElementById("ai-chat-messages");

    box.innerHTML += `
        <div style="margin-bottom:12px; text-align:${isUser ? 'right' : 'left'};">
            <div style="display:inline-block;
                        padding:8px 12px;
                        border-radius:15px;
                        max-width:75%;
                        background:${isUser ? '#004d40' : '#e0f2f1'};
                        color:${isUser ? 'white' : '#004d40'};">
                <b>${sender}:</b> ${text}
            </div>
        </div>
    `;

    box.scrollTop = box.scrollHeight;
}

async function sendAIMessage() {

    const input = document.getElementById("ai-chat-input");
    const message = input.value.trim();
    if (!message) return;

    appendMessage("You", message, true);
    input.value = "";

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        if (!data.success) {
            appendMessage("AI",
                typeof data.message === "object"
                    ? JSON.stringify(data.message)
                    : data.message
            );
            return;
        }

        appendMessage("AI", data.reply);

    } catch (err) {
        appendMessage("AI", "Network error.");
    }
}

/* ENTER KEY SUPPORT */
document.addEventListener("DOMContentLoaded", function(){
    const input = document.getElementById("ai-chat-input");
    if(input){
        input.addEventListener("keypress", function(e){
            if(e.key === "Enter"){
                sendAIMessage();
            }
        });
    }
});


</script>


<script>

/* ================= SIDEBAR ================= */

function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hidden");
    document.getElementById("main").classList.toggle("full");
}

/* ================= SECTION SWITCH ================= */

function showDashboard(){
    document.getElementById("dashboard-section").style.display="block";
    document.getElementById("patients-section").style.display="none";
}

function showPatients(){
    document.getElementById("dashboard-section").style.display="none";
    document.getElementById("patients-section").style.display="block";
    loadPatients();
}

/* ================= LOAD DASHBOARD ================= */

window.onload = async function(){
    try{

        // Load doctor stats
        const statsRes = await fetch("/api/doctor/stats");
        const statsData = await statsRes.json();

        if(!statsData.success) {
            return location.href = "login.html";
        }

        document.getElementById("total-patients").innerText =
            statsData.total_patients;

        document.getElementById("total-mri").innerText =
            statsData.total_mri_reports;

    }catch(err){
        console.error("Dashboard error:", err);
    }
};


/* ================= LOAD PATIENTS ================= */

async function loadPatients(){
    try{
        const res = await fetch("/api/doctor/patients");
        const data = await res.json();

        if(!data.success) return;

        const list = document.getElementById("patients-list");
        list.innerHTML = "";

        data.patients.forEach(p=>{
            list.innerHTML += `
                <div class="patient-item" onclick="openPatient(${p.id})">
                     <div class="patient-item-info">
                         <strong>${p.fullname}</strong>
                         <span>${p.email}</span>
                     </div>
                </div>
            `;
        });

    }catch(err){
        console.error("Load patients error:", err);
    }
}

/* ================= OPEN PATIENT ================= */

async function openPatient(id){
    try{
        const res = await fetch(`/api/doctor/patient/${id}`);
        const data = await res.json();

        if(!data.success) return;

        let mriHTML = "No MRI uploaded.";
        if(data.mri_list && data.mri_list.length > 0){
            const latest = data.mri_list[0];

            mriHTML = `
            <p><b>Prediction:</b> ${latest.prediction}</p>
        `;
        }
        
        let mocaHTML = "No MoCA test found.";
        if(data.latest_moca){
            mocaHTML = `
                <p><b>Severity:</b> ${data.latest_moca.severity}</p>
                <p><b>Score:</b>
                ${data.latest_moca.total_score}/30</p>
            `;
        }

        let html = `
            <h3>${data.patient.fullname}</h3>
            <p><b>Email:</b> ${data.patient.email}</p>
            <p><b>Age:</b> ${data.patient.age}</p>
            <p><b>Gender:</b> ${data.patient.gender}</p>
            <hr>
            <h4>Latest MRI</h4>
            ${mriHTML}
            <hr>
            <h4>Latest MoCA Assessment</h4>
            ${mocaHTML}
            <hr>
            <h4>Upload New MRI</h4>
            <input type="file" id="mri-file">
            <button class="btn-primary"
                onclick="uploadMRI(${id})">
                Upload & Predict
            </button>
            <div id="upload-status"
                 style="margin-top:10px;color:green;display:none;">
                🟢 Uploading & Analyzing...
            </div>
        `;

        document.getElementById("patient-details").innerHTML = html;

    }catch(err){
        console.error("Open patient error:", err);
    }
}

/* ================= UPLOAD MRI ================= */

async function uploadMRI(id){

    const file = document.getElementById("mri-file").files[0];
    if(!file) return alert("Select MRI image");

    document.getElementById("upload-status").style.display="block";

    let fd = new FormData();
    fd.append("mri", file);

    try{
        const res = await fetch(`/api/doctor/upload-mri/${id}`,{
            method:"POST",
            body:fd
        });

        const data = await res.json();

        document.getElementById("upload-status").style.display="none";

        if(data.success){
            alert("MRI Uploaded & Analyzed Successfully");
            openPatient(id);
        }else{
            alert(data.message || "Upload failed");
        }

    }catch(err){
        document.getElementById("upload-status").style.display="none";
        alert("Network error during upload.");
    }
}

/* ================= LOGOUT ================= */

function logout(){
    fetch("/api/logout",{method:"POST"})
        .then(()=>location.href="login.html");
}

</script>


</body>
</html>
